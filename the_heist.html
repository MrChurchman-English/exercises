<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Heist — Verb Forms Exercise</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1a2e;
    --bg-card: #16213e;
    --bg-input: #0f3460;
    --accent: #e94560;
    --accent-glow: rgba(233, 69, 96, 0.3);
    --gold: #f0c040;
    --gold-glow: rgba(240, 192, 64, 0.3);
    --green: #4ecca3;
    --green-glow: rgba(78, 204, 163, 0.2);
    --text: #e0e0e0;
    --text-muted: #8899aa;
    --wrong: #e94560;
    --right: #4ecca3;
    --border: #2a3a5e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 19px;
    line-height: 1.75;
    min-height: 100vh;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
    position: relative;
  }

  header::after {
    content: '';
    display: block;
    width: 60px;
    height: 3px;
    background: var(--accent);
    margin: 20px auto 0;
    box-shadow: 0 0 12px var(--accent-glow);
  }

  h1 {
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 2.2em;
    letter-spacing: -0.5px;
    color: #fff;
    margin-bottom: 8px;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85em;
    color: var(--text-muted);
    font-weight: 400;
  }

  .instructions {
    background: var(--bg-card);
    border-left: 3px solid var(--accent);
    padding: 16px 20px;
    margin-bottom: 36px;
    border-radius: 0 8px 8px 0;
    font-style: italic;
    color: var(--text-muted);
    font-size: 0.95em;
  }

  .story {
    background: var(--bg-card);
    border-radius: 12px;
    padding: 36px 32px;
    border: 1px solid var(--border);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    margin-bottom: 32px;
  }

  .story p {
    margin-bottom: 20px;
  }

  .story p:last-child {
    margin-bottom: 0;
  }

  .gap-wrapper {
    display: inline;
    position: relative;
  }

  .gap-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65em;
    color: var(--accent);
    vertical-align: super;
    margin-right: 1px;
    font-weight: 500;
  }

  .gap-input {
    background: var(--bg-input);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82em;
    padding: 3px 8px;
    width: 200px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
  }

  .gap-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
  }

  .gap-input.correct {
    border-color: var(--green);
    background: rgba(78, 204, 163, 0.1);
    box-shadow: 0 0 8px var(--green-glow);
  }

  .gap-input.wrong {
    border-color: var(--wrong);
    background: rgba(233, 69, 96, 0.1);
    box-shadow: 0 0 8px var(--accent-glow);
  }

  .hint-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72em;
    color: var(--text-muted);
    font-style: italic;
  }

  .correction {
    display: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75em;
    color: var(--gold);
    margin-left: 4px;
  }

  .correction.visible {
    display: inline;
  }

  .controls {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  button {
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.9em;
    padding: 12px 28px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
  }

  button:hover {
    transform: translateY(-1px);
  }

  .btn-check {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 16px var(--accent-glow);
  }

  .btn-show {
    background: var(--gold);
    color: var(--bg);
    box-shadow: 0 4px 16px var(--gold-glow);
  }

  .btn-reset {
    background: transparent;
    color: var(--text-muted);
    border: 1.5px solid var(--border);
  }

  .btn-reset:hover {
    border-color: var(--text-muted);
    color: var(--text);
  }

  .scoreboard {
    text-align: center;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 24px;
    min-height: 48px;
  }

  .score-display {
    display: inline-block;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 24px;
    font-size: 1em;
  }

  .score-num {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    color: var(--green);
    font-size: 1.2em;
  }

  .score-total {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
  }

  @media (max-width: 600px) {
    .container { padding: 24px 16px 60px; }
    .story { padding: 24px 18px; }
    h1 { font-size: 1.6em; }
    .gap-input { width: 150px; font-size: 0.78em; }
    body { font-size: 17px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>The <span>Heist</span></h1>
    <div class="subtitle">Verb Forms Exercise — 45 gaps</div>
  </header>

  <div class="instructions">
    Put the verbs in brackets into the correct form. Pay attention to active and passive voice, reported speech, and conditionals.
  </div>

  <div class="controls">
    <button class="btn-check" onclick="checkAnswers()">Check answers</button>
    <button class="btn-show" onclick="showAnswers()">Show answers</button>
    <button class="btn-reset" onclick="resetAll()">Reset</button>
  </div>

  <div class="scoreboard" id="scoreboard"></div>

  <div class="story" id="story"></div>
</div>

<script>
const gaps = [
  { id:1,  hint:"work",              answers:["had been working","had worked"] },
  { id:2,  hint:"assign",            answers:["was assigned"] },
  { id:3,  hint:"steal",             answers:["had been stolen"] },
  { id:4,  hint:"switch off",        answers:["had been switched off"] },
  { id:5,  hint:"enter",             answers:["entered"] },
  { id:6,  hint:"arrive",            answers:["arrived"] },
  { id:7,  hint:"already/begin",     answers:["had already begun"] },
  { id:8,  hint:"inspect",           answers:["was inspecting"] },
  { id:9,  hint:"find",              answers:["found"] },
  { id:10, hint:"send",              answers:["was sent"] },
  { id:11, hint:"know",              answers:["knew"] },
  { id:12, hint:"plan",              answers:["had been planned"] },
  { id:13, hint:"recently/upgrade",  answers:["had recently been upgraded","had been recently upgraded"] },
  { id:14, hint:"manage",            answers:["had managed","managed"] },
  { id:15, hint:"do",                answers:["had done"] },
  { id:16, hint:"have",              answers:["had","must have had"] },
  { id:17, hint:"interview",         answers:["interviewed"] },
  { id:18, hint:"question",          answers:["was questioning"] },
  { id:19, hint:"notice",            answers:["noticed"] },
  { id:20, hint:"behave",            answers:["was behaving"] },
  { id:21, hint:"avoid",             answers:["was avoiding","avoided"] },
  { id:22, hint:"shake",             answers:["were shaking"] },
  { id:23, hint:"ask",               answers:["asked","was asked"] },
  { id:24, hint:"be",                answers:["had been"] },
  { id:25, hint:"claim",             answers:["claimed"] },
  { id:26, hint:"stay",              answers:["had stayed","had been staying"] },
  { id:27, hint:"tell",              answers:["told"] },
  { id:28, hint:"not/come",          answers:["had not come","hadn't come"] },
  { id:29, hint:"analyse",           answers:["had been analysed","had been analyzed","was being analysed","was being analyzed","was analysed","was analyzed"] },
  { id:30, hint:"inform",            answers:["was informed"] },
  { id:31, hint:"find",              answers:["had been found"] },
  { id:32, hint:"belong",            answers:["belonged"] },
  { id:33, hint:"release",           answers:["had been released"] },
  { id:34, hint:"currently/believe",  answers:["currently believes"] },
  { id:35, hint:"work",              answers:["were working","had been working"] },
  { id:36, hint:"not/disable",       answers:["had not disabled","hadn't disabled"] },
  { id:37, hint:"never/get",         answers:["would never have got","would never have gotten"] },
  { id:38, hint:"search",            answers:["is searching","are searching"] },
  { id:39, hint:"not/see",           answers:["has not been seen","hasn't been seen"] },
  { id:40, hint:"find",              answers:["find"] },
  { id:41, hint:"already/sell",      answers:["will already have been sold","will have already been sold"] },
  { id:42, hint:"be",                answers:["was"] },
  { id:43, hint:"ever/handle",       answers:["had ever handled"] },
  { id:44, hint:"go",                answers:["goes"] },
  { id:45, hint:"make",              answers:["will make","is going to make"] },
];

const storyTemplate = `The case that made Detective Inspector Kate Shaw famous began on a cold Tuesday in November 2019. She <G1> (1. work) for the Metropolitan Police for over fifteen years when she <G2> (2. assign) to the biggest case of her career. A collection of rare diamonds <G3> (3. steal) from the National Museum during the night, and the security cameras <G4> (4. switch off) remotely before the thieves <G5> (5. enter) the building.

When Kate <G6> (6. arrive) at the museum the following morning, forensic officers <G7> (7. already/begin) examining the scene. While she <G8> (8. inspect) the broken display cabinet, one of her colleagues <G9> (9. find) a single black glove near the emergency exit. It <G10> (10. send) to the lab immediately for DNA analysis.

Kate <G11> (11. know) that the robbery <G12> (12. plan) for months. The alarm system <G13> (13. recently/upgrade), yet someone <G14> (14. manage) to bypass it completely. She told her team that whoever <G15> (15. do) this <G16> (16. have) inside knowledge of the building.

Over the following weeks, Kate <G17> (17. interview) dozens of museum employees. While she <G18> (18. question) a security guard named Marcus, she <G19> (19. notice) that he <G20> (20. behave) strangely. He <G21> (21. avoid) eye contact and his hands <G22> (22. shake). When she <G23> (23. ask) where he <G24> (24. be) on the night of the robbery, he <G25> (25. claim) that he <G26> (26. stay) at home with his wife. His wife, however, later <G27> (27. tell) detectives that Marcus <G28> (28. not/come) home until three in the morning.

Meanwhile, the glove <G29> (29. analyse) by the forensic team. Kate <G30> (30. inform) that a DNA match <G31> (31. find). It <G32> (32. belong) to a convicted burglar called Ray Novak, who <G33> (33. release) from prison only two months earlier.

Kate <G34> (34. currently/believe) that Marcus and Ray <G35> (35. work) together. If Marcus <G36> (36. not/disable) the alarm, Ray <G37> (37. never/get) into the building. Right now, a team of officers <G38> (38. search) for Ray, who <G39> (39. not/see) since the night of the robbery. Kate thinks that by the time they <G40> (40. find) him, the diamonds <G41> (41. already/sell) on the black market.

Kate told journalists yesterday that this <G42> (42. be) the most complex case she <G43> (43. ever/handle). If the investigation <G44> (44. go) well, she <G45> (45. make) an arrest within the next few days.`;

function buildStory() {
  let html = storyTemplate;
  // Split into paragraphs
  const paragraphs = html.split('\n\n');
  let result = '';
  for (const para of paragraphs) {
    let p = para;
    for (const gap of gaps) {
      const tag = `<G${gap.id}>`;
      if (p.includes(tag)) {
        const inputHtml = `<span class="gap-wrapper"><span class="gap-number">${gap.id}</span><input type="text" class="gap-input" id="gap-${gap.id}" data-id="${gap.id}" autocomplete="off" spellcheck="false"><span class="correction" id="corr-${gap.id}"></span></span>`;
        p = p.replace(tag, inputHtml);
      }
    }
    // Wrap hint text in parentheses
    p = p.replace(/\((\d+\.\s*[^)]+)\)/g, '<span class="hint-text">($1)</span>');
    result += `<p>${p}</p>`;
  }
  document.getElementById('story').innerHTML = result;
}

function normalize(str) {
  return str.trim().toLowerCase().replace(/\s+/g, ' ').replace(/[\u0027\u0060\u00B4\u2018\u2019\u201B\u2032\uFF07]/g, "'");
}

function checkAnswers() {
  let correct = 0;
  for (const gap of gaps) {
    const input = document.getElementById(`gap-${gap.id}`);
    const corr = document.getElementById(`corr-${gap.id}`);
    const val = normalize(input.value);
    if (!val) {
      input.classList.remove('correct', 'wrong');
      corr.classList.remove('visible');
      continue;
    }
    const isCorrect = gap.answers.some(a => normalize(a) === val);
    input.classList.remove('correct', 'wrong');
    corr.classList.remove('visible');
    if (isCorrect) {
      input.classList.add('correct');
      correct++;
    } else {
      input.classList.add('wrong');
      corr.textContent = '→ ' + gap.answers[0];
      corr.classList.add('visible');
    }
  }
  document.getElementById('scoreboard').innerHTML =
    `<div class="score-display">Score: <span class="score-num">${correct}</span> <span class="score-total">/ 45</span></div>`;
}

function showAnswers() {
  let correct = 0;
  for (const gap of gaps) {
    const input = document.getElementById(`gap-${gap.id}`);
    const corr = document.getElementById(`corr-${gap.id}`);
    const val = normalize(input.value);
    const isCorrect = val && gap.answers.some(a => normalize(a) === val);
    input.classList.remove('correct', 'wrong');
    corr.classList.remove('visible');
    if (isCorrect) {
      input.classList.add('correct');
      correct++;
    } else {
      input.value = gap.answers[0];
      input.classList.add('correct');
      if (gap.answers.length > 1) {
        corr.textContent = '(also: ' + gap.answers.slice(1).join(', ') + ')';
        corr.classList.add('visible');
      }
    }
  }
  document.getElementById('scoreboard').innerHTML =
    `<div class="score-display">Score: <span class="score-num">${correct}</span> <span class="score-total">/ 45</span> (before reveal)</div>`;
}

function resetAll() {
  for (const gap of gaps) {
    const input = document.getElementById(`gap-${gap.id}`);
    const corr = document.getElementById(`corr-${gap.id}`);
    input.value = '';
    input.classList.remove('correct', 'wrong');
    corr.classList.remove('visible');
  }
  document.getElementById('scoreboard').innerHTML = '';
}

// Navigate between inputs with Enter key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.target.classList.contains('gap-input')) {
    const id = parseInt(e.target.dataset.id);
    if (id < 45) {
      document.getElementById(`gap-${id + 1}`).focus();
    } else {
      checkAnswers();
    }
  }
});

buildStory();
</script>
</body>
</html>
