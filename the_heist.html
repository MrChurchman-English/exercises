<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Heist: Part I — The Crime</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f172a;
    --bg-card: #1e293b;
    --bg-input: #0f172a;
    --accent: #38bdf8; /* Cyan for better visibility */
    --accent-glow: rgba(56, 189, 248, 0.3);
    --gold: #fbbf24;
    --text: #f8fafc;
    --text-muted: #94a3b8;
    --wrong: #f87171;
    --right: #4ade80;
    --border: #334155;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Crimson Pro', serif; font-size: 20px; line-height: 1.8; }
  .container { max-width: 850px; margin: 0 auto; padding: 40px 24px; }
  
  header { text-align: center; margin-bottom: 40px; }
  h1 { font-family: 'DM Sans', sans-serif; font-size: 2.5em; color: #fff; }
  h1 span { color: var(--accent); }
  .progress-bar { color: var(--accent); font-family: 'JetBrains Mono'; font-size: 0.9em; margin-bottom: 20px; }

  .story { background: var(--bg-card); border-radius: 16px; padding: 40px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .gap-input {
    background: var(--bg-input);
    border: 2px solid var(--border);
    border-radius: 6px;
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85em;
    padding: 4px 12px;
    width: 220px;
    outline: none;
    transition: all 0.2s;
  }
  .gap-input::placeholder { color: var(--text-muted); font-style: italic; opacity: 0.6; }
  .gap-input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
  .gap-input.correct { border-color: var(--right); background: rgba(74, 222, 128, 0.1); }
  .gap-input.wrong { border-color: var(--wrong); background: rgba(248, 113, 113, 0.1); }

  .correction { color: var(--gold); font-family: 'JetBrains Mono'; font-size: 0.75em; display: block; margin-top: 2px; height: 0; overflow: visible; opacity: 0; transition: opacity 0.3s; }
  .correction.visible { opacity: 1; height: auto; margin-bottom: 10px; }

  .controls { display: flex; gap: 15px; justify-content: center; margin: 30px 0; }
  button { font-family: 'DM Sans', sans-serif; font-weight: 600; padding: 12px 30px; border-radius: 8px; cursor: pointer; border: none; transition: transform 0.2s; }
  .btn-check { background: var(--accent); color: #0f172a; }
  .btn-next { background: var(--gold); color: #0f172a; display: none; text-decoration: none; align-items: center; padding: 12px 30px; font-size: 0.9em; }
  
  .feedback-box { text-align: center; font-family: 'DM Sans'; margin-top: 20px; min-height: 50px; }
  .rank { font-weight: bold; color: var(--gold); font-size: 1.2em; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="progress-bar">MISSION PHASE: 01/02</div>
    <h1>The <span>Heist</span></h1>
    <p style="color: var(--text-muted)">Part I: The Evidence at the Museum</p>
  </header>

  <div class="story" id="story"></div>

  <div class="feedback-box" id="feedback"></div>

  <div class="controls">
    <button class="btn-check" onclick="checkAnswers()">Verify Findings</button>
    <a href="the_heist_part2.html" class="btn-next" id="nextBtn">Proceed to Investigation →</a>
  </div>
</div>

<script>
const gaps = [
  { id:1,  hint:"work",                answers:["had been working","had worked"] },
  { id:2,  hint:"assign",             answers:["was assigned"] },
  { id:3,  hint:"steal",              answers:["had been stolen"] },
  { id:4,  hint:"switch off",         answers:["had been switched off"] },
  { id:5,  hint:"enter",              answers:["entered"] },
  { id:6,  hint:"arrive",             answers:["arrived"] },
  { id:7,  hint:"already/begin",      answers:["had already begun"] },
  { id:8,  hint:"inspect",            answers:["was inspecting"] },
  { id:9,  hint:"find",               answers:["found"] },
  { id:10, hint:"send",               answers:["was sent"] },
  { id:11, hint:"know",               answers:["knew"] },
  { id:12, hint:"plan",               answers:["had been planned"] },
  { id:13, hint:"recently/upgrade",   answers:["had recently been upgraded","had been recently upgraded"] },
  { id:14, hint:"manage",             answers:["had managed","managed"] },
  { id:15, hint:"do",                 answers:["had done"] },
  { id:16, hint:"have",               answers:["had","must have had"] }
];

const storyTemplate = `The case that made Detective Inspector Kate Shaw famous began on a cold Tuesday in November 2019. She <G1> for the Metropolitan Police for over fifteen years when she <G2> to the biggest case of her career. A collection of rare diamonds <G3> from the National Museum during the night, and the security cameras <G4> remotely before the thieves <G5> the building.

When Kate <G6> at the museum the following morning, forensic officers <G7> examining the scene. While she <G8> the broken display cabinet, one of her colleagues <G9> a single black glove near the emergency exit. It <G10> to the lab immediately for DNA analysis.

Kate <G11> that the robbery <G12> for months. The alarm system <G13>, yet someone <G14> to bypass it completely. She told her team that whoever <G15> this <G16> inside knowledge of the building.`;

function buildStory() {
  let html = '';
  const paragraphs = storyTemplate.split('\n\n');
  paragraphs.forEach(para => {
    let p = para;
    gaps.forEach(gap => {
      const tag = `<G${gap.id}>`;
      if (p.includes(tag)) {
        const input = `<span style="display:inline-block"><input type="text" class="gap-input" id="gap-${gap.id}" placeholder="(${gap.id}. ${gap.hint})" autocomplete="off"><span class="correction" id="corr-${gap.id}"></span></span>`;
        p = p.replace(tag, input);
      }
    });
    html += `<p style="margin-bottom:20px">${p}</p>`;
  });
  document.getElementById('story').innerHTML = html;
}

function checkAnswers() {
  let correctCount = 0;
  gaps.forEach(gap => {
    const input = document.getElementById(`gap-${gap.id}`);
    const corr = document.getElementById(`corr-${gap.id}`);
    const val = input.value.trim().toLowerCase().replace(/['’]/g, "'");
    const isCorrect = gap.answers.some(a => a.toLowerCase() === val);
    
    input.classList.remove('correct', 'wrong');
    corr.classList.remove('visible');

    if (isCorrect) {
      input.classList.add('correct');
      correctCount++;
    } else if (val !== "") {
      input.classList.add('wrong');
      corr.textContent = `→ ${gap.answers[0]}`;
      corr.classList.add('visible');
    }
  });

  const feedback = document.getElementById('feedback');
  if (correctCount === gaps.length) {
    feedback.innerHTML = `<span class="rank">RANK: Senior Detective.</span> All evidence secured.`;
    document.getElementById('nextBtn').style.display = 'inline-flex';
  } else {
    feedback.innerHTML = `Score: ${correctCount}/${gaps.length}. Correct all errors to unlock the next phase.`;
  }
}

buildStory();
</script>
</body>
</html>
