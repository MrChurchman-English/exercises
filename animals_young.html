<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Animal Families Quiz</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f7f4; color: #333; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2d6a4f; text-align: center; margin-bottom: 5px; }
        p.instruction { text-align: center; color: #555; margin-bottom: 20px; }
        .word-bank { background: #d8f3dc; padding: 15px; border-radius: 10px; text-align: center; font-style: italic; margin-bottom: 25px; border: 1px dashed #2d6a4f; font-weight: bold;}
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .item { display: flex; align-items: center; justify-content: space-between; background: #fafafa; padding: 10px; border-radius: 8px; border: 1px solid #eee; }
        input { padding: 8px; width: 120px; border: 2px solid #ddd; border-radius: 5px; outline: none; transition: 0.3s; }
        input:focus { border-color: #40916c; }
        .correct { background-color: #b7e4c7 !important; border-color: #2d6a4f !important; color: #081c15; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>animal families</h1>
    <p class="instruction">match the parent to the correct young.</p>

    <div class="word-bank">
        puppy, kitten, calf, foal, lamb, piglet, duckling, chick, kid, cub, fawn, joey, cygnet, caterpillar, tadpole, pup, gosling, kit
    </div>

    <div class="grid" id="exercise"></div>
</div>

<script>
    const pairs = {
        "dog 🐶": "puppy", "cat 🐱": "kitten", "cow 🐄": "calf", "horse 🐎": "foal", 
        "sheep 🐑": "lamb", "pig 🐷": "piglet", "duck 🦆": "duckling", "chicken 🐔": "chick", 
        "goat 🐐": "kid", "lion 🦁": "cub", "deer 🦌": "fawn", "kangaroo 🦘": "joey", 
        "swan 🦢": "cygnet", "butterfly 🦋": "caterpillar", "frog 🐸": "tadpole", 
        "elephant 🐘": "calf", "whale 🐋": "calf", "seal 🦭": "pup", "goose 🪿": "gosling", "rabbit 🐰": "kit"
    };

    const container = document.getElementById('exercise');
    
    Object.entries(pairs).forEach(([adult, young]) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `<span>${adult}</span> <input type="text" data-answer="${young}">`;
        container.appendChild(div);
    });

    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', (e) => {
            if (e.target.value.toLowerCase().trim() === e.target.dataset.answer) {
                e.target.classList.add('correct');
            } else {
                e.target.classList.remove('correct');
            }
        });
    });
</script>
</body>
</html>
