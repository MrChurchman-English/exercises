<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ultimate Animal Sounds Quiz</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 850px; margin: auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        .instruction { text-align: center; color: #7f8c8d; margin-bottom: 40px; font-size: 1.1rem; }
        
        .part-section { margin-bottom: 50px; border: 2px solid #eef2f3; border-radius: 12px; padding: 25px; background-color: #fff; }
        .part-header { font-size: 1.5rem; color: #d35400; margin-bottom: 20px; font-weight: bold; border-bottom: 3px solid #e67e22; display: inline-block; padding-bottom: 5px; }
        
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        @media (max-width: 700px) { .quiz-grid { grid-template-columns: 1fr; } }
        
        .item { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; background: #fafafa; border-radius: 8px; border: 1px solid #ececec; }
        .animal-name { font-weight: 600; font-size: 1.1rem; color: #2c3e50; }
        
        select { padding: 10px; border-radius: 6px; border: 2px solid #bdc3c7; width: 190px; outline: none; font-size: 0.95rem; cursor: pointer; }
        .correct { border-color: #27ae60 !important; background-color: #eafaf1 !important; color: #1e8449; font-weight: bold; }
        .incorrect { border-color: #e74c3c !important; background-color: #fdedec !important; color: #943126; }

        .section-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 15px; border-top: 1px solid #eee; }
        .check-btn { padding: 12px 25px; background-color: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .check-btn:hover { background-color: #2980b9; }
        .score-box { font-weight: bold; font-size: 1.1rem; }

        .reset-all { display: block; margin: 20px auto; padding: 12px 30px; background-color: #95a5a6; color: white; border: none; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>🐾 Animal Sounds Masterclass</h1>
    <p class="instruction">Choose the correct sound for each animal. Check your score for each part!</p>

    <div id="quiz-wrapper"></div>

    <button class="reset-all" onclick="location.reload()">Reset All Exercises</button>
</div>

<script>
    const quizData = [
        {
            title: "Part 1: Farm & Home",
            items: [
                { a: "dog", s: "bark, growl, woof" },
                { a: "cat", s: "miaow, purr" },
                { a: "cow", s: "moo, low" },
                { a: "sheep", s: "bleat" },
                { a: "goat", s: "bleat" },
                { a: "horse", s: "neigh, whinny" },
                { a: "pig", s: "grunt, squeal, oink" },
                { a: "donkey", s: "bray, hee-haw" },
                { a: "hen", s: "cluck" },
                { a: "rooster", s: "crow" },
                { a: "chick", s: "cheep, peep" }
            ]
        },
        {
            title: "Part 2: Wild & Field",
            items: [
                { a: "lion", s: "roar, growl" },
                { a: "bear", s: "growl, roar" },
                { a: "monkey", s: "chatter" },
                { a: "elephant", s: "trumpet" },
                { a: "snake", s: "hiss" },
                { a: "wolf", s: "howl" },
                { a: "frog", s: "croak" },
                { a: "mouse", s: "squeak" },
                { a: "raven", s: "croak" },
                { a: "hyena", s: "laugh" }
            ]
        },
        {
            title: "Part 3: Birds & Critters",
            items: [
                { a: "duck", s: "quack" },
                { a: "bee", s: "buzz" },
                { a: "goose", s: "honk, hiss" },
                { a: "owl", s: "hoot, screech" },
                { a: "turkey", s: "gobble" },
                { a: "parrot", s: "squawk" },
                { a: "cricket", s: "chirp" },
                { a: "bat", s: "screech" },
                { a: "pigeon", s: "coo" },
                { a: "dove", s: "coo" },
                { a: "crow", s: "caw" }
            ]
        }
    ];

    function buildQuiz() {
        const wrapper = document.getElementById('quiz-wrapper');
        quizData.forEach((part, pIdx) => {
            const section = document.createElement('div');
            section.className = 'part-section';
            
            // Sounds for this specific part only
            const sounds = [...new Set(part.items.map(i => i.s))].sort();

            let sectionHtml = `<div class="part-header">${part.title}</div><div class="quiz-grid">`;
            
            part.items.forEach((item, iIdx) => {
                sectionHtml += `
                    <div class="item">
                        <span class="animal-name">${item.a}</span>
                        <select id="p${pIdx}i${iIdx}" data-answer="${item.s}">
                            <option value="">Choose sound...</option>
                            ${sounds.map(s => `<option value="${s}">${s}</option>`).join('')}
                        </select>
                    </div>
                `;
            });

            sectionHtml += `</div>
                <div class="section-footer">
                    <button class="check-btn" onclick="checkSection(${pIdx})">Check Part ${pIdx+1}</button>
                    <div class="score-box" id="score${pIdx}"></div>
                </div>`;
            
            section.innerHTML = sectionHtml;
            wrapper.appendChild(section);
        });
    }

    function checkSection(pIdx) {
        let correctCount = 0;
        const total = quizData[pIdx].items.length;

        quizData[pIdx].items.forEach((item, iIdx) => {
            const el = document.getElementById(`p${pIdx}i${iIdx}`);
            if (el.value === el.getAttribute('data-answer')) {
                el.className = 'correct';
                correctCount++;
            } else if (el.value !== "") {
                el.className = 'incorrect';
            }
        });

        document.getElementById(`score${pIdx}`).innerText = `Part ${pIdx+1} Score: ${correctCount} / ${total}`;
    }

    buildQuiz();
</script>

</body>
</html>
