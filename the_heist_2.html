<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Heist: Part II — The Interrogation</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f172a;
    --bg-card: #1e293b;
    --bg-input: #0f172a;
    --accent: #38bdf8;
    --accent-glow: rgba(56, 189, 248, 0.3);
    --gold: #fbbf24;
    --text: #f8fafc;
    --text-muted: #94a3b8;
    --wrong: #f87171;
    --right: #4ade80;
    --border: #334155;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Crimson Pro', serif; font-size: 20px; line-height: 1.8; }
  .container { max-width: 850px; margin: 0 auto; padding: 40px 24px; }
  
  header { text-align: center; margin-bottom: 40px; }
  h1 { font-family: 'DM Sans', sans-serif; font-size: 2.5em; color: #fff; }
  h1 span { color: var(--accent); }
  .progress-bar { color: var(--gold); font-family: 'JetBrains Mono'; font-size: 0.9em; margin-bottom: 20px; }

  .story { background: var(--bg-card); border-radius: 16px; padding: 40px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .gap-input {
    background: var(--bg-input);
    border: 2px solid var(--border);
    border-radius: 6px;
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85em;
    padding: 4px 12px;
    width: 220px;
    outline: none;
    transition: all 0.2s;
    margin-bottom: 5px;
  }
  .gap-input::placeholder { color: var(--text-muted); font-style: italic; opacity: 0.5; font-size: 0.9em; }
  .gap-input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
  .gap-input.correct { border-color: var(--right); background: rgba(74, 222, 128, 0.1); }
  .gap-input.wrong { border-color: var(--wrong); background: rgba(248, 113, 113, 0.1); }

  .correction { color: var(--gold); font-family: 'JetBrains Mono'; font-size: 0.75em; display: block; margin-top: 2px; height: 0; overflow: visible; opacity: 0; transition: opacity 0.3s; }
  .correction.visible { opacity: 1; height: auto; margin-bottom: 12px; }

  .controls { display: flex; gap: 15px; justify-content: center; margin: 30px 0; }
  button { font-family: 'DM Sans', sans-serif; font-weight: 600; padding: 12px 30px; border-radius: 8px; cursor: pointer; border: none; transition: transform 0.2s; }
  .btn-check { background: var(--accent); color: #0f172a; }
  
  .feedback-box { text-align: center; font-family: 'DM Sans'; margin-top: 20px; min-height: 80px; }
  .rank { font-weight: bold; color: var(--gold); font-size: 1.4em; display: block; margin-bottom: 5px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="progress-bar">MISSION PHASE: 02/02</div>
    <h1>The <span>Heist</span></h1>
    <p style="color: var(--text-muted)">Part II: Closing the Case</p>
  </header>

  <div class="story" id="story"></div>

  <div class="feedback-box" id="feedback"></div>

  <div class="controls">
    <button class="btn-check" onclick="checkAnswers()">Submit Final Case Report</button>
  </div>
</div>

<script>
const gaps = [
  { id:17, hint:"interview",          answers:["interviewed"] },
  { id:18, hint:"question",           answers:["was questioning"] },
  { id:19, hint:"notice",             answers:["noticed"] },
  { id:20, hint:"behave",             answers:["was behaving"] },
  { id:21, hint:"avoid",              answers:["was avoiding","avoided"] },
  { id:22, hint:"shake",              answers:["were shaking"] },
  { id:23, hint:"ask",                answers:["asked","was asked"] },
  { id:24, hint:"be",                 answers:["had been"] },
  { id:25, hint:"claim",              answers:["claimed"] },
  { id:26, hint:"stay",               answers:["had stayed","had been staying"] },
  { id:27, hint:"tell",               answers:["told"] },
  { id:28, hint:"not/come",           answers:["had not come","hadn't come"] },
  { id:29, hint:"analyse",            answers:["had been analysed","had been analyzed","was being analysed","was being analyzed"] },
  { id:30, hint:"inform",             answers:["was informed"] },
  { id:31, hint:"find",               answers:["had been found"] },
  { id:32, hint:"belong",             answers:["belonged"] },
  { id:33, hint:"release",            answers:["had been released"] },
  { id:34, hint:"already/believe",    answers:["already believed","believed"] },
  { id:35, hint:"work",               answers:["were working","had been working"] },
  { id:36, hint:"not/disable",        answers:["had not disabled","hadn't disabled"] },
  { id:37, hint:"never/get",          answers:["would never have got","would never have gotten"] },
  { id:38, hint:"search",             answers:["were searching"] },
  { id:39, hint:"not/see",            answers:["had not been seen","hadn't been seen"] },
  { id:40, hint:"find",               answers:["found"] },
  { id:41, hint:"already/sell",       answers:["would already have been sold","would have already been sold"] },
  { id:42, hint:"be",                 answers:["was"] },
  { id:43, hint:"ever/handle",        answers:["had ever handled"] },
  { id:44, hint:"go",                 answers:["went"] },
  { id:45, hint:"make",               answers:["would make","was going to make"] }
];

const storyTemplate = `Over the following weeks, Kate <G17> dozens of museum employees. While she <G18> a security guard named Marcus, she <G19> that he <G20> strangely. He <G21> eye contact and his hands <G22>. When she <G23> where he <G24> on the night of the robbery, he <G25> that he <G26> at home with his wife. His wife, however, later <G27> detectives that Marcus <G28> home until three in the morning.

Meanwhile, the glove <G29> by the forensic team. Kate <G30> that a DNA match <G31>. It <G32> to a convicted burglar called Ray Novak, who <G33> from prison only two months earlier.

By the second week of the investigation, Kate <G34> that Marcus and Ray <G35> together. She was certain that if Marcus <G36> the alarm, Ray <G37> into the building. While a team of officers <G38> for Ray, who <G39> since the night of the robbery, Kate feared that by the time they <G40> him, the diamonds <G41> on the black market.

Kate told journalists at a press conference that this <G42> the most complex case she <G43>. She promised that if the investigation <G44> well, she <G45> an arrest within the following few days.`;

function buildStory() {
  let html = '';
  const paragraphs = storyTemplate.split('\n\n');
  paragraphs.forEach(para => {
    let p = para;
    gaps.forEach(gap => {
      const tag = `<G${gap.id}>`;
      if (p.includes(tag)) {
        const input = `<span style="display:inline-block"><input type="text" class="gap-input" id="gap-${gap.id}" placeholder="(${gap.id}. ${gap.hint})" autocomplete="off" spellcheck="false"><span class="correction" id="corr-${gap.id}"></span></span>`;
        p = p.replace(tag, input);
      }
    });
    html += `<p style="margin-bottom:20px">${p}</p>`;
  });
  document.getElementById('story').innerHTML = html;
}

function checkAnswers() {
  let correctCount = 0;
  gaps.forEach(gap => {
    const input = document.getElementById(`gap-${gap.id}`);
    const corr = document.getElementById(`corr-${gap.id}`);
    const val = input.value.trim().toLowerCase().replace(/['’]/g, "'");
    const isCorrect = gap.answers.some(a => a.toLowerCase() === val);
    
    input.classList.remove('correct', 'wrong');
    corr.classList.remove('visible');

    if (isCorrect) {
      input.classList.add('correct');
      correctCount++;
    } else if (val !== "") {
      input.classList.add('wrong');
      corr.textContent = `→ ${gap.answers[0]}`;
      corr.classList.add('visible');
    }
  });

  const feedback = document.getElementById('feedback');
  const percent = (correctCount / gaps.length) * 100;
  
  if (percent === 100) {
    feedback.innerHTML = `<span class="rank">PROMOTED TO CHIEF INSPECTOR!</span> The diamonds have been recovered and Novak is back in custody. Case closed.`;
  } else if (percent > 70) {
    feedback.innerHTML = `<span class="rank">DETECTIVE.</span> Good work, but the defense lawyer found ${gaps.length - correctCount} errors in your report. Fix them!`;
  } else {
    feedback.innerHTML = `<span class="rank">TRAINEE CONSTABLE.</span> The Superintendent is not happy. Your report has ${gaps.length - correctCount} errors. Back to the files!`;
  }
}

buildStory();
</script>
</body>
</html>
